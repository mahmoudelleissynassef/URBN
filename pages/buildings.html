<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buildings Directory — URBN</title>
  <meta name="description" content="The full URBN directory of verified Grade A and A+ office buildings across 16 Africa & MENA markets, filterable by market and grade."/>
  <link rel="canonical" href="https://urbnoffices.com/buildings"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="URBN"/>
  <meta property="og:title" content="Buildings Directory — URBN"/>
  <meta property="og:description" content="Verified Grade A and A+ office buildings across 16 Africa & MENA markets."/>
  <meta property="og:url" content="https://urbnoffices.com/buildings"/>
  <meta property="og:image" content="https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1200&q=85"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Buildings Directory — URBN"/>
  <meta name="twitter:description" content="Verified Grade A and A+ office buildings across 16 Africa & MENA markets."/>
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1200&q=85"/>
  <link rel="stylesheet" href="../css/urbn.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="pt-nav" style="padding:60px 0 80px;">
  <div class="w">
    <div class="flex-b mb48">
      <div>
        <span class="overline label-navy">Verified Inventory</span>
        <h1 style="font-size:44px;">Buildings Directory</h1>
        <p style="font-size:14px;color:var(--text-2);margin-top:12px;">Grade A and A+ office buildings across 16 markets. All listings directly verified.</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <select class="fi fi-sel" id="bd-market" onchange="filterBuildings()" style="width:180px;font-size:12px;">
          <option value="">All Markets</option>
        </select>
        <select class="fi fi-sel" id="bd-grade" onchange="filterBuildings()" style="width:130px;font-size:12px;">
          <option value="">All Grades</option>
          <option value="A+">Grade A+</option>
          <option value="A">Grade A</option>
        </select>
      </div>
    </div>
    <div id="bd-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;"></div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="../data/data.js"></script>
<script src="/js/i18n.js"></script><script src="/js/i18n-pages.js"></script><script src="../js/urbn.js"></script>
<script src="../js/listings.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  injectNav('../');
  injectFooter('../');
  const sel = document.getElementById('bd-market');
  URBN_DATA.markets.forEach(m => sel.innerHTML += `<option value="${m.id}">${m.name}</option>`);
  await URBN_LISTINGS.load();
  filterBuildings();
});
function filterBuildings() {
  let res = [...URBN_LISTINGS.buildings];
  const m = document.getElementById('bd-market').value;
  const g = document.getElementById('bd-grade').value;
  if (m) res = res.filter(b => b.market === m);
  if (g) res = res.filter(b => b.grade === g);
  const grid = document.getElementById('bd-grid');
  const mktName = m ? (URBN_DATA.markets.find(x => x.id === m) || {}).name : '';
  grid.innerHTML = res.length ? res.map(b => renderCard(b, '../', { noSave: true })).join('') : listingsEmptyState('../', mktName);
}
</script>
</body>
</html>
