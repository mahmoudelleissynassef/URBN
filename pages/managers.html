<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacts Directory — URBN</title>
  <link rel="stylesheet" href="../css/urbn.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="pt-nav" style="padding:60px 0 80px;">
  <div class="w">
    <div class="flex-b mb48">
      <div>
        <span class="overline overline-accent">Verified Contacts</span>
        <h1 style="font-size:44px;">Managers Directory</h1>
        <p style="font-size:14px;color:var(--text-2);margin-top:12px;">Verified real estate and facilities managers relevant to corporate office leasing across Africa & MENA.</p>
      </div>
      <div style="display:flex;gap:8px;">
        <input type="text" class="fi" id="mq" placeholder="Search name or firm..." style="width:220px;" oninput="filterMgrs()">
        <select class="fi fi-sel" id="mm" onchange="filterMgrs()" style="width:160px;"><option value="">All Markets</option></select>
      </div>
    </div>
    <div class="card" id="mgrs-list"></div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="../data/data.js"></script>
<script src="../js/urbn.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  injectNav('../'); injectFooter('../');
  const s = document.getElementById('mm');
  URBN_DATA.markets.forEach(m => s.innerHTML += `<option value="${m.id}">${m.name}</option>`);
  renderMgrs(URBN_DATA.managers);
});
function filterMgrs() {
  const q = document.getElementById('mq').value.toLowerCase();
  const m = document.getElementById('mm').value;
  let r = URBN_DATA.managers;
  if (q) r = r.filter(x => x.name.toLowerCase().includes(q) || x.company.toLowerCase().includes(q));
  if (m) r = r.filter(x => x.markets.includes(m));
  renderMgrs(r);
}
function renderMgrs(list) {
  const el = document.getElementById('mgrs-list');
  if (!list.length) { el.innerHTML = '<div style="padding:48px;text-align:center;color:var(--text-2);">No contacts found.</div>'; return; }
  el.innerHTML = list.map(m => {
    const init = m.name.split(' ').map(n=>n[0]).join('').slice(0,2);
    return `<div class="mr">
      <div class="mr-init">${init}</div>
      <div style="flex:1;">
        <div class="mr-name">${m.name} ${m.verified?'<span class="badge badge-verified" style="font-size:8px;margin-left:6px;">Verified</span>':''}</div>
        <div class="mr-role">${m.role} · ${m.company}</div>
        <div class="mr-tags">${m.markets.map(id=>`<span class="badge badge-gated" style="font-size:8px;">${URBN_DATA.markets.find(x=>x.id===id)?.name||id}</span>`).join('')}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;">
        <div style="font-size:11px;color:var(--text-2);text-align:right;">${m.areas.join(' · ')}</div>
        <button class="btn btn-ghost btn-sm" onclick="showToast('Introduction request sent to ${m.name}')">Request Introduction</button>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
