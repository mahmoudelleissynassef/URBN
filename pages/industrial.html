<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Industrial & Logistics — URBN</title>
  <link rel="stylesheet" href="../css/urbn.css"/>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="pt-nav" style="display:flex;min-height:calc(100vh - 60px);">
  <!-- Sidebar -->
  <div class="search-sidebar" style="width:260px;flex-shrink:0;">
    <div class="label mb-16">Industrial Filters</div>
    <div class="filter-section">
      <div class="filter-title">Asset Type</div>
      <div class="chip-group">
        <button class="chip active">Warehouse</button>
        <button class="chip active">Distribution Centre</button>
        <button class="chip">Cold Storage</button>
        <button class="chip">Dark Store/Kitchen</button>
        <button class="chip">BTS</button>
        <button class="chip">BTO</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Clear Height (m)</div>
      <div class="range-pair">
        <input type="number" class="form-input" placeholder="Min" style="font-size:12px;">
        <input type="number" class="form-input" placeholder="Max" style="font-size:12px;">
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Floor Loading (kN/sqm)</div>
      <input type="number" class="form-input" placeholder="Min floor loading" style="font-size:12px;">
    </div>
    <div class="filter-section">
      <div class="filter-title">Min Dock Doors</div>
      <input type="number" class="form-input" placeholder="e.g. 4" style="font-size:12px;">
    </div>
    <div class="filter-section">
      <div class="filter-title">Power Capacity (kVA)</div>
      <input type="number" class="form-input" placeholder="Min kVA" style="font-size:12px;">
    </div>
    <div class="filter-section">
      <div class="filter-title">Compliance</div>
      <div class="chip-group">
        <button class="chip">Food Grade</button>
        <button class="chip">Pharma Grade</button>
        <button class="chip">Hazmat</button>
      </div>
    </div>
    <button class="btn btn-primary w-full mt-24">Apply Filters</button>
  </div>

  <!-- Main -->
  <div style="flex:1;padding:24px 32px;">
    <div class="flex-between mb-24">
      <div>
        <h2 style="font-size:24px;">Industrial & Logistics</h2>
        <p style="font-size:12px;color:var(--text-dim);margin-top:4px;">${len(URBN_DATA["industrial"])} listings available</p>
      </div>
    </div>
    <div id="industrialGrid" style="display:flex;flex-direction:column;gap:16px;"></div>

    <!-- BTS/BTO Builder -->
    <div class="market-widget" style="margin-top:40px;">
      <div class="market-widget-title">BTS/BTO Requirement Builder</div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:20px;">Describe your operational needs and get a recommended spec summary.</p>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Operations Type</label>
          <select class="form-input form-select"><option>E-commerce Fulfillment</option><option>Cold Chain</option><option>Manufacturing</option><option>Dark Kitchen</option></select>
        </div>
        <div class="form-group"><label class="form-label">Pallet Positions Required</label><input type="number" class="form-input" placeholder="e.g. 5000"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Daily Throughput (pallets)</label><input type="number" class="form-input" placeholder="e.g. 200"></div>
        <div class="form-group"><label class="form-label">Delivery Timeline</label>
          <select class="form-input form-select"><option>Immediately</option><option>3-6 months</option><option>6-12 months</option><option>12+ months (BTS/BTO)</option></select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="showToast('BTS/BTO spec generated — contact URBN for full analysis')">Generate Spec Summary</button>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="../data/data.js"></script>
<script src="../js/urbn.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  injectNavbar("../");
  injectFooter("../");
  const grid = document.getElementById("industrialGrid");
  URBN_DATA.industrial.forEach(unit => {
    const market = URBN_DATA.markets.find(m => m.id === unit.market);
    grid.innerHTML += `<div class="card card-hover" style="padding:24px;">
      <div class="flex-between mb-16">
        <div>
          <div style="font-family:'DM Serif Display',serif;font-size:18px;color:var(--white);">${unit.anonName}</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:4px;">${unit.submarket} · ${market?.country} · ${unit.type.toUpperCase()}</div>
        </div>
        <span class="badge badge-available">Available</span>
      </div>
      <div class="industrial-spec-grid">
        <div class="ind-spec"><div class="ind-spec-val">${unit.size.toLocaleString()} sqm</div><div class="ind-spec-label">GLA</div></div>
        <div class="ind-spec"><div class="ind-spec-val">${unit.clearHeight}m</div><div class="ind-spec-label">Clear Height</div></div>
        <div class="ind-spec"><div class="ind-spec-val">${unit.dockDoors}</div><div class="ind-spec-label">Dock Doors</div></div>
        <div class="ind-spec"><div class="ind-spec-val">${unit.power.toLocaleString()} kVA</div><div class="ind-spec-label">Power</div></div>
        <div class="ind-spec"><div class="ind-spec-val">${unit.floorLoading} kN/sqm</div><div class="ind-spec-label">Floor Loading</div></div>
        <div class="ind-spec"><div class="ind-spec-val text-gold">${unit.rentCurrency} ${unit.rent}/sqm</div><div class="ind-spec-label">Asking Rent</div></div>
      </div>
      ${unit.compliance.length > 0 ? `<div style="margin-top:14px;display:flex;gap:6px;">${unit.compliance.map(c => `<span class="chip active" style="cursor:default;font-size:10px;">${c}</span>`).join("")}</div>` : ""}
    </div>`;
  });
});
</script>
</body>
</html>
