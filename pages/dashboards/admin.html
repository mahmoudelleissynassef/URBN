<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Console — URBN</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="stylesheet" href="../../css/urbn.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="pt-nav" style="padding:60px 0 80px;">
  <div class="w-sm">
    <div class="mb32">
      <span class="overline label-navy">Admin</span>
      <h1 style="font-size:40px;">Admin Console</h1>
    </div>
    <div id="admin-body">
      <div style="padding:60px 0;text-align:center;color:var(--text-2);font-family:var(--fm);font-size:11px;letter-spacing:.12em;">LOADING…</div>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="../../data/data.js"></script>
<script src="../../js/urbn.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  injectNav('../../'); injectFooter('../../');
  const user = await URBNAuth.requireAuth('/pages/signin.html');
  if (!user) return;
  document.getElementById('admin-body').innerHTML = `
    <div class="form-note">
      <p><strong>Restricted area.</strong> You are signed in as <strong>${esc(user.email)}</strong>. The admin console — for reviewing and approving operator listing submissions and batch uploads before they go live — is in active development and limited to verified URBN administrators.</p>
    </div>
    <div class="card" style="padding:30px;margin-top:18px;">
      <div class="form-sec-title" style="margin-top:0;">Coming to this console</div>
      <ul style="margin:4px 0 0 18px;color:var(--text-2);font-size:14px;line-height:1.9;">
        <li>Review pending building &amp; unit submissions (draft → pending review → approved / rejected)</li>
        <li>Approve or reject batch CSV uploads before publication</li>
        <li>Manage company subscriptions and tier approvals</li>
        <li>Audit trail of submissions and introductions</li>
      </ul>
      <p style="font-size:12.5px;color:var(--text-2);margin-top:18px;line-height:1.7;">These tools require the platform listing tables to be live. Until then, submissions are stored as <strong>pending review</strong> in Supabase. For admin access, contact <a href="mailto:operators@urbnoffices.com" class="text-navy" style="text-decoration:underline;">operators@urbnoffices.com</a>.</p>
    </div>`;
});
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
</script>
</body>
</html>
