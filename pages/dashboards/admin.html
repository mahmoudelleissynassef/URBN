<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Console — URBN</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="stylesheet" href="../../css/urbn.css"/>
  <style>
    .admin-layout { display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap; }
    .admin-side { flex:0 0 210px; display:flex; flex-direction:column; gap:5px; position:sticky; top:84px; }
    .admin-main { flex:1; min-width:0; }
    .admin-navbtn { display:block; width:100%; text-align:left; padding:9px 14px; border:1px solid var(--border); background:var(--bg-white); border-radius:6px; font-size:13px; color:var(--text); cursor:pointer; transition:background .15s,color .15s; }
    .admin-navbtn:hover { border-color:var(--navy,#243A5E); }
    .admin-navbtn.on { background:var(--navy,#243A5E); color:#fff; border-color:var(--navy,#243A5E); }
    @media (max-width:760px){ .admin-side{ flex-basis:100%; position:static; flex-direction:row; flex-wrap:wrap; } .admin-navbtn{ width:auto; } }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="pt-nav" style="padding:40px 0 80px;">
  <div class="w">
    <div class="mb32"><span class="overline label-navy">Admin</span><h1 style="font-size:40px;">URBN Admin Console</h1></div>
    <div id="admin-gate"><div style="padding:60px 0;text-align:center;color:var(--text-2);font-family:var(--fm);font-size:11px;letter-spacing:.12em;">CHECKING ACCESS…</div></div>
    <div id="admin-app" class="hidden">
      <div class="admin-layout">
        <aside class="admin-side">
          <button class="admin-navbtn on" id="tab-overview" onclick="showTab('overview')">Overview</button>
          <button class="admin-navbtn" id="tab-pending" onclick="showTab('pending')">Pending listings</button>
          <button class="admin-navbtn" id="tab-batches" onclick="showTab('batches')">Pending batches</button>
          <button class="admin-navbtn" id="tab-approved" onclick="showTab('approved')">Approved</button>
          <button class="admin-navbtn" id="tab-rejected" onclick="showTab('rejected')">Rejected</button>
          <button class="admin-navbtn" id="tab-reveal" onclick="showTab('reveal')">Reveal requests</button>
          <button class="admin-navbtn" id="tab-buildings" onclick="showTab('buildings')">Buildings</button>
          <button class="admin-navbtn" id="tab-membership" onclick="showTab('membership')">Membership</button>
          <button class="admin-navbtn" id="tab-users" onclick="showTab('users')">Users</button>
          <button class="admin-navbtn" id="tab-companies" onclick="showTab('companies')">Companies</button>
          <button class="admin-navbtn" id="tab-capex" onclick="showTab('capex')">Construction costs</button>
          <button class="admin-navbtn" id="tab-analytics" onclick="showTab('analytics')">Analytics</button>
        </aside>
        <div class="admin-main">
          <div id="panel-overview"></div>
          <div id="panel-pending" class="hidden"></div>
          <div id="panel-batches" class="hidden"></div>
          <div id="panel-approved" class="hidden"></div>
          <div id="panel-rejected" class="hidden"></div>
          <div id="panel-reveal" class="hidden"></div>
          <div id="panel-buildings" class="hidden"></div>
          <div id="panel-membership" class="hidden"></div>
          <div id="panel-users" class="hidden"></div>
          <div id="panel-companies" class="hidden"></div>
          <div id="panel-capex" class="hidden"></div>
          <div id="panel-analytics" class="hidden"></div>
        </div>
      </div>
    </div>
    <div class="mbg" id="reject-modal">
      <div class="modal">
        <div class="mh"><div><div class="label mb12">Review</div><h3>Reject — reason required</h3></div><div class="mx" onclick="closeModal('reject-modal')">✕</div></div>
        <div class="mb">
          <div class="fg"><label class="fl">Rejection reason</label><select class="fi fi-sel" id="rj-reason"></select></div>
          <div class="fg"><label class="fl">Note to uploader (optional)</label><textarea class="fi" id="rj-note" placeholder="Explain what's needed..."></textarea></div>
        </div>
        <div class="mf"><button class="btn btn-ghost" onclick="closeModal('reject-modal')">Cancel</button><button class="btn btn-navy" id="rj-confirm" onclick="confirmReject()">Confirm rejection</button></div>
      </div>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="../../data/data.js"></script>
<script src="../../js/urbn.js"></script>
<script>
const TABS = ['overview', 'pending', 'batches', 'approved', 'rejected', 'reveal', 'buildings', 'membership', 'users', 'companies', 'capex', 'analytics'];
const LOADERS = { overview: loadOverview, pending: loadPending, batches: loadBatches, approved: loadApproved, rejected: loadRejected, reveal: loadReveal, buildings: loadBuildings, membership: loadMembership, users: loadUsers, companies: loadCompanies, capex: loadCapex, analytics: loadAnalytics };
let REJECTION_REASONS = ['Duplicate listing', 'Insufficient building information', 'Missing or unclear photos', 'Floorplan required', 'Rent or service charge missing', 'Unable to verify ownership/operator authority', 'Building does not meet URBN quality criteria', 'Location or map pin unclear', 'Suspicious or inconsistent information', 'Outside current market coverage', 'Other'];
fetch('/api/config').then(r => r.json()).then(c => { if (c && Array.isArray(c.rejectionReasons) && c.rejectionReasons.length) REJECTION_REASONS = c.rejectionReasons; }).catch(() => {});

document.addEventListener('DOMContentLoaded', async () => {
  injectNav('../../'); injectFooter('../../');
  const user = await URBNAuth.requireAuth('/pages/signin.html');
  if (!user) return;
  const me = await adminFetch('/api/admin/me', 'GET');
  if (!me || !me.ok || !me.admin) {
    document.getElementById('admin-gate').innerHTML = `<div class="form-note"><p><strong>Access denied.</strong> This console is restricted to URBN administrators. You are signed in as <strong>${esc(user.email)}</strong>.</p></div>`;
    return;
  }
  document.getElementById('admin-gate').classList.add('hidden');
  document.getElementById('admin-app').classList.remove('hidden');
  const tab = new URLSearchParams(location.search).get('tab');
  showTab(TABS.includes(tab) ? tab : 'overview');
});

function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }
function fmtDate(s) { try { return new Date(s).toISOString().split('T')[0]; } catch (e) { return s || ''; } }
function row(label, val) { return (val == null || val === '') ? '' : `<div style="display:flex;gap:8px;padding:2px 0;font-size:12.5px;"><span style="color:var(--text-2);min-width:130px;">${esc(label)}</span><span>${esc(val)}</span></div>`; }
function loadingBox() { return '<div style="padding:30px 0;color:var(--text-2);font-size:13px;">Loading…</div>'; }
function emptyBox(msg) { return `<div style="padding:30px 0;color:var(--text-2);">${esc(msg)}</div>`; }
function errBox(j) { return `<div class="form-note"><p>Could not load (${esc((j && j.error) || 'error')}).</p></div>`; }

async function adminFetch(path, method, body) {
  await URBNAuth.init();
  if (!URBNAuth.session) return { ok: false, error: 'no_session' };
  try {
    const res = await fetch(path, { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + URBNAuth.session.access_token }, body: body ? JSON.stringify(body) : undefined });
    let j = {}; try { j = await res.json(); } catch (e) {}
    return j;
  } catch (e) { return { ok: false, error: 'network' }; }
}

function showTab(t) {
  TABS.forEach(x => {
    document.getElementById('panel-' + x).classList.toggle('hidden', x !== t);
    document.getElementById('tab-' + x).className = 'admin-navbtn' + (x === t ? ' on' : '');
  });
  try { history.replaceState(null, '', location.pathname + '?tab=' + t); } catch (e) {}
  (LOADERS[t] || function () {})();
}

// ── Overview ─────────────────────────────────────────────────────────────────
async function loadOverview() {
  const panel = document.getElementById('panel-overview');
  panel.innerHTML = loadingBox();
  const j = await adminFetch('/api/admin/overview', 'GET');
  if (!j.ok) { panel.innerHTML = errBox(j); return; }
  const c = j.counts || {};
  const cards = [
    ['Pending listings', c.pendingListings, 'pending'], ['Pending batch rows', c.pendingBatchRows, 'batches'],
    ['Pending membership', c.pendingMembership, 'membership'], ['Approved listings', c.approved, 'approved'],
    ['Rejected listings', c.rejected, 'rejected'], ['Total users', c.users, 'users'],
    ['Total companies', c.companies, 'companies'],
  ];
  const tiles = cards.map(([label, n, tab]) => `<button class="card" onclick="showTab('${tab}')" style="padding:20px;text-align:left;cursor:pointer;border:none;background:var(--surface,#fff);">
      <div style="font-family:var(--fd);font-size:34px;line-height:1;">${Number(n || 0)}</div>
      <div style="font-size:12px;color:var(--text-2);margin-top:6px;">${esc(label)}</div></button>`).join('');
  const latest = (j.latest || []).map(r => `<tr><td>${fmtDate(r.created_at)}</td><td>${esc(r.request_type || '')}</td><td>${esc(r.market || '')}</td><td>${esc(r.company || '')}</td><td>${esc(r.email || '')}</td><td><span class="badge ${r.status === 'approved' ? 'badge-available' : 'badge-gated'}">${esc(r.status || '')}</span></td></tr>`).join('');
  panel.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px;">${tiles}</div>
    <h3 style="font-size:16px;margin:0 0 12px;">Latest submissions</h3>
    ${latest ? `<div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>Date</th><th>Type</th><th>Market</th><th>Company</th><th>Email</th><th>Status</th></tr></thead><tbody>${latest}</tbody></table></div>` : emptyBox('No submissions yet.')}`;
}

// ── Pending single listings ──────────────────────────────────────────────────
let PENDING_BLD_OPTS = '<option value="">— Create a new building from this submission —</option>';
async function loadPending() {
  const panel = document.getElementById('panel-pending');
  panel.innerHTML = loadingBox();
  const j = await adminFetch('/api/admin/pending-listings', 'GET');
  if (!j.ok) { panel.innerHTML = errBox(j); return; }
  if (!j.listings.length) { panel.innerHTML = emptyBox('No pending listing submissions.'); return; }
  // Fetch the approved-building inventory once so each card can offer "assign to existing".
  try {
    const bj = await adminFetch('/api/admin/buildings?status=approved', 'GET');
    if (bj.ok && bj.buildings) PENDING_BLD_OPTS = '<option value="">— Create a new building from this submission —</option>' + bj.buildings.map(b => `<option value="${esc(b.id)}">${esc(b.name)}${b.submarket ? ' — ' + esc(b.submarket) : ''}</option>`).join('');
  } catch (e) {}
  panel.innerHTML = j.listings.map(L => {
    const p = L.payload || {};
    const photoCount = Array.isArray(p.photoPaths) ? p.photoPaths.length : 0;
    const mediaPaths = (Array.isArray(p.photoPaths) ? p.photoPaths : []).concat(p.floorplanPath ? [p.floorplanPath] : []);
    return `<div class="card" style="padding:22px;margin-bottom:16px;">
      <div class="flex-b" style="margin-bottom:12px;flex-wrap:wrap;gap:10px;">
        <div><div style="font-family:var(--fd);font-size:20px;">${esc(p.building || '(no name)')}</div><div style="font-size:12px;color:var(--text-2);">${esc(L.name || '')} · ${esc(L.company || '')} · ${esc(L.email || '')}</div></div>
        <span class="badge badge-gated">${esc(L.status)}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 30px;">
        ${row('Submitted', fmtDate(L.created_at))}${row('Job title', p.title)}
        ${row('Submitter type', p.submitterType)}${row('Market', L.market)}
        ${row('District', p.district)}${row('Address', p.address)}
        ${row('Google Maps', p.mapsUrl)}${row('Floor', p.floor)}
        ${row('Fit-out', p.fitOut)}${row('Offering', p.offeringType)}
        ${row('Area (sqm)', p.area)}${row('Desks/seats', p.seats)}
        ${row('Rent', p.rent)}${row('Currency', p.currency)}
        ${row('Pricing basis', p.pricingBasis)}${row('Service charge', p.serviceCharge)}
        ${row('Svc basis', p.serviceChargeBasis)}${row('Availability', p.availabilityDate)}
        ${row('Min term', p.minTerm)}${row('Photos', photoCount)}
        ${row('Floorplan', p.floorplanPath ? 'Yes' : 'No')}
      </div>
      ${L.message ? `<div style="margin-top:8px;font-size:12.5px;"><span style="color:var(--text-2);">Notes:</span> ${esc(L.message)}</div>` : ''}
      ${(Array.isArray(L.media) && L.media.length) ? `<div style="margin-top:14px;">
        <div style="font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Uploaded photos &amp; floorplan (${L.media.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;">
          ${L.media.map(m => m.kind === 'floorplan'
            ? `<a href="${esc(m.url)}" target="_blank" rel="noopener" class="card" style="padding:18px;text-align:center;font-size:12.5px;">View floorplan →</a>`
            : `<a href="${esc(m.url)}" target="_blank" rel="noopener"><img src="${esc(m.url)}" alt="Listing photo" loading="lazy" style="width:100%;height:110px;object-fit:cover;border-radius:4px;border:1px solid var(--border);"></a>`).join('')}
        </div>
      </div>` : (mediaPaths.length ? `<div style="margin-top:8px;font-size:11px;color:var(--text-2);word-break:break-all;"><strong>Media paths (${esc(p.mediaBucket || 'listing-media')}):</strong><br>${mediaPaths.map(esc).join('<br>')}</div>` : '')}
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
        <label class="fl" style="display:block;margin-bottom:6px;">Assign to a building${(p.existingBuildingId ? ' (uploader picked an existing one)' : '')}</label>
        <select class="fi fi-sel" id="assign-${L.id}" style="max-width:420px;">${PENDING_BLD_OPTS}</select>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-navy btn-sm" onclick="approveListing('${L.id}',this)">Approve</button>
          <button class="btn btn-outline btn-sm" onclick="openReject('listing','${L.id}')">Reject</button>
        </div>
      </div>
    </div>`;
  }).join('');
  // Preselect the uploader's chosen building where one was provided.
  j.listings.forEach(L => { const p = L.payload || {}; if (p.existingBuildingId) { const sel = document.getElementById('assign-' + L.id); if (sel) sel.value = p.existingBuildingId; } });
}

async function approveListing(id, btn) {
  const sel = document.getElementById('assign-' + id);
  const buildingId = sel ? sel.value : '';
  const msg = buildingId ? 'Approve and attach this unit to the selected existing building?' : 'Approve this listing? A new building will be created and it will go live publicly.';
  if (!confirm(msg)) return;
  setBtnBusy(btn, true, 'Approving…');
  const j = await adminFetch('/api/admin/approve-listing', 'POST', { requestId: id, buildingId: buildingId || null });
  setBtnBusy(btn, false);
  if (j.ok) { showToast('Listing approved and published'); loadPending(); }
  else showToast('Approve failed: ' + (j.error || 'error') + (j.detail ? ' — ' + j.detail : ''), 'error');
}

// ── Rejection modal (reason dropdown + optional note) ────────────────────────
let REJECT_CTX = null;
function openReject(kind, id) {
  REJECT_CTX = { kind, id };
  const sel = document.getElementById('rj-reason');
  sel.innerHTML = REJECTION_REASONS.map(r => `<option>${esc(r)}</option>`).join('');
  document.getElementById('rj-note').value = '';
  openModal('reject-modal');
}
async function confirmReject() {
  if (!REJECT_CTX) return;
  const reasonCode = document.getElementById('rj-reason').value;
  const note = document.getElementById('rj-note').value.trim();
  const btn = document.getElementById('rj-confirm'); setBtnBusy(btn, true, 'Saving…');
  const { kind, id } = REJECT_CTX;
  let j;
  if (kind === 'listing') j = await adminFetch('/api/admin/reject-listing', 'POST', { requestId: id, reasonCode, reason: note });
  else if (kind === 'batch-row') j = await adminFetch('/api/admin/reject-batch-row', 'POST', { rowId: id, reasonCode, reason: note });
  setBtnBusy(btn, false);
  if (j && j.ok) {
    showToast('Rejected — uploader notified');
    closeModal('reject-modal');
    if (kind === 'listing') loadPending(); else loadBatches();
  } else showToast('Failed: ' + ((j && j.error) || 'error'), 'error');
}

// ── Batches ──────────────────────────────────────────────────────────────────
async function loadBatches() {
  const panel = document.getElementById('panel-batches');
  panel.innerHTML = loadingBox();
  const j = await adminFetch('/api/admin/listing-batches', 'GET');
  if (!j.ok) { panel.innerHTML = errBox(j); return; }
  if (!j.batches.length) { panel.innerHTML = emptyBox('No batch uploads.'); return; }
  panel.innerHTML = j.batches.map(B => {
    const rows = j.rows.filter(r => r.batch_id === B.id);
    return `<div class="card" style="padding:22px;margin-bottom:18px;">
      <div class="flex-b" style="flex-wrap:wrap;gap:10px;margin-bottom:10px;">
        <div><div style="font-family:var(--fd);font-size:18px;">${esc(B.filename || 'batch')}</div><div style="font-size:12px;color:var(--text-2);">${fmtDate(B.created_at)} · processed ${B.rows_processed} · accepted ${B.rows_accepted} · rejected ${B.rows_rejected}</div></div>
        <div style="display:flex;gap:8px;align-items:center;"><span class="badge badge-gated">${esc(B.status)}</span><button class="btn btn-navy btn-sm" onclick="approveValidBatch('${B.id}',this)">Approve all valid</button></div>
      </div>
      <div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>#</th><th>Building</th><th>Market</th><th>Offering</th><th>Status</th><th></th></tr></thead><tbody>
      ${rows.map(r => { const d = r.raw || {}; return `<tr><td>${r.row_index}</td><td>${esc(d.building_name || '—')}</td><td>${esc(d.market || '—')}</td><td>${esc(d.offering_type || '—')}</td><td><span class="badge ${r.status === 'approved' ? 'badge-available' : 'badge-gated'}">${esc(r.status)}</span>${(r.errors && r.errors.length) ? ' <span style="font-size:10px;color:#B42318;">' + esc(r.errors.join(', ')) + '</span>' : ''}</td><td>${r.status === 'pending_review' ? `<button class="btn btn-navy btn-sm" onclick="approveRow('${r.id}',this)">Approve</button> <button class="btn btn-ghost btn-sm" onclick="rejectRow('${r.id}',this)">Reject</button>` : ''}</td></tr>`; }).join('')}
      </tbody></table></div>
    </div>`;
  }).join('');
}
async function approveRow(id, btn) { setBtnBusy(btn, true, '…'); const j = await adminFetch('/api/admin/approve-batch-row', 'POST', { rowId: id }); setBtnBusy(btn, false); if (j.ok) { showToast('Row approved'); loadBatches(); } else showToast('Failed: ' + (j.error || 'error'), 'error'); }
function rejectRow(id) { openReject('batch-row', id); }
async function approveValidBatch(id, btn) { if (!confirm('Approve all valid (pending) rows in this batch? They go live.')) return; setBtnBusy(btn, true, '…'); const j = await adminFetch('/api/admin/approve-valid-batch', 'POST', { batchId: id }); setBtnBusy(btn, false); if (j.ok) { showToast(j.approved + ' rows approved'); loadBatches(); } else showToast('Failed', 'error'); }

// ── Approved ─────────────────────────────────────────────────────────────────
async function loadApproved() {
  const panel = document.getElementById('panel-approved');
  panel.innerHTML = loadingBox();
  const j = await adminFetch('/api/admin/listings?status=approved', 'GET');
  if (!j.ok) { panel.innerHTML = errBox(j); return; }
  if (!j.buildings || !j.buildings.length) { panel.innerHTML = emptyBox('No approved listings yet.'); return; }
  panel.innerHTML = `<p style="font-size:12px;color:var(--text-2);margin-bottom:10px;">Use <strong>Manage</strong> to view uploaded photos and mark one <em>public-safe</em> + <em>main</em> so it appears on the anonymized card and in Stay vs Go.</p>
    <div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>Building</th><th>Market</th><th>District</th><th>Approved</th><th></th></tr></thead><tbody>${j.buildings.map(b => `<tr><td>${esc(b.name)}</td><td>${esc(b.market)}</td><td>${esc(b.submarket || '')}</td><td>${fmtDate(b.approved_at)}</td><td style="white-space:nowrap;"><button class="btn btn-ghost btn-sm" onclick="manageBuilding('${esc(b.id)}')">Manage</button> <button class="btn btn-ghost btn-sm" onclick="unpublishBuilding('${b.id}',this)">Unpublish</button></td></tr>`).join('')}</tbody></table></div>`;
}
async function unpublishBuilding(id, btn) {
  if (!confirm('Unpublish this building? It will be removed from public results until re-approved.')) return;
  setBtnBusy(btn, true, '…');
  const j = await adminFetch('/api/admin/unpublish-building', 'POST', { buildingId: id, status: 'draft' });
  setBtnBusy(btn, false);
  if (j.ok) { showToast('Building unpublished'); loadApproved(); } else showToast('Failed: ' + (j.error || 'error'), 'error');
}

// ── Rejected ─────────────────────────────────────────────────────────────────
async function loadRejected() {
  const panel = document.getElementById('panel-rejected');
  panel.innerHTML = loadingBox();
  const j = await adminFetch('/api/admin/listings?status=rejected', 'GET');
  if (!j.ok) { panel.innerHTML = errBox(j); return; }
  if (!j.listings || !j.listings.length) { panel.innerHTML = emptyBox('No rejected listings.'); return; }
  panel.innerHTML = `<div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>Building</th><th>Submitter</th><th>Reason</th><th>Date</th><th></th></tr></thead><tbody>${j.listings.map(L => `<tr><td>${esc((L.payload && L.payload.building) || '')}</td><td>${esc(L.email || '')}</td><td>${esc(L.review_note || '')}</td><td>${fmtDate(L.reviewed_at)}</td><td><button class="btn btn-ghost btn-sm" onclick="reopenListing('${L.id}',this)">Reopen</button></td></tr>`).join('')}</tbody></table></div>`;
}
async function reopenListing(id, btn) {
  setBtnBusy(btn, true, '…');
  const j = await adminFetch('/api/admin/reopen-listing', 'POST', { requestId: id });
  setBtnBusy(btn, false);
  if (j.ok) { showToast('Listing reopened — back in Pending'); loadRejected(); } else showToast('Failed: ' + (j.error || 'error'), 'error');
}

// ── Membership requests ──────────────────────────────────────────────────────
async function loadMembership() {
  const panel = document.getElementById('panel-membership');
  panel.innerHTML = loadingBox();
  const j = await adminFetch('/api/admin/membership-requests', 'GET');
  if (!j.ok) { panel.innerHTML = errBox(j); return; }
  if (!j.requests || !j.requests.length) { panel.innerHTML = emptyBox('No membership requests yet.'); return; }
  panel.innerHTML = `<div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>Date</th><th>Name</th><th>Company</th><th>Email</th><th>Requested tier</th><th>Status</th><th></th></tr></thead><tbody>${j.requests.map(r => {
    const tier = (r.payload && r.payload.requestedTier) || '';
    const actions = (r.status === 'pending' || r.status === 'new')
      ? `<button class="btn btn-navy btn-sm" onclick="approveMembership('${r.id}',this)">Approve</button> <button class="btn btn-ghost btn-sm" onclick="rejectMembership('${r.id}',this)">Reject</button>`
      : '';

// ── Analytics ────────────────────────────────────────────────────────────────
function kvTable(obj, headers) {
  const entries = Object.entries(obj || {}).sort((a, b) => b[1] - a[1]);
  if (!entries.length) return `<p style="font-size:12.5px;color:var(--text-2);">Not enough data yet.</p>`;
  return `<div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>${esc(headers[0])}</th><th>${esc(headers[1])}</th></tr></thead><tbody>${entries.map(([k, v]) => `<tr><td>${esc(k)}</td><td>${typeof v === 'number' ? v : esc(v)}</td></tr>`).join('')}</tbody></table></div>`;
}
function statTiles(pairs) {
  return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:8px;">${pairs.map(([label, n]) => `<div class="card" style="padding:16px;"><div style="font-family:var(--fd);font-size:26px;line-height:1;">${Number(n || 0)}</div><div style="font-size:11.5px;color:var(--text-2);margin-top:5px;">${esc(label)}</div></div>`).join('')}</div>`;
}
async function loadAnalytics() {
  const panel = document.getElementById('panel-analytics');
  panel.innerHTML = loadingBox();
  const j = await adminFetch('/api/admin/analytics', 'GET');
  if (!j.ok) { panel.innerHTML = errBox(j); return; }
  const a = j.analytics || {};
  const s = a.supply || {}, d = a.demand || {}, e = a.engagement || {}, m = a.membership || {}, q = a.dataQuality || {};
  const sec = (title, body) => `<div style="margin-bottom:30px;"><h3 style="font-size:16px;margin:0 0 12px;">${esc(title)}</h3>${body}</div>`;
  const avgRent = Object.entries(s.avgRentByMarket || {}).sort((x, y) => y[1] - x[1]);
  const avgRentTbl = avgRent.length
    ? `<div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>Market</th><th>Avg rent</th><th>Range</th></tr></thead><tbody>${avgRent.map(([k, v]) => { const rg = (s.rentRangeByMarket || {})[k] || []; return `<tr><td>${esc(k)}</td><td>${v}</td><td>${rg.length ? esc(rg[0] + ' – ' + rg[1]) : '—'}</td></tr>`; }).join('')}</tbody></table></div>`
    : `<p style="font-size:12.5px;color:var(--text-2);">Not enough data yet.</p>`;
  const mostSaved = (e.mostSaved || []).length
    ? `<div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>Building</th><th>Market</th><th>Saves</th></tr></thead><tbody>${e.mostSaved.map(x => `<tr><td>${esc(x.building)}</td><td>${esc(x.market)}</td><td>${Number(x.saves)}</td></tr>`).join('')}</tbody></table></div>`
    : `<p style="font-size:12.5px;color:var(--text-2);">Not enough data yet.</p>`;
  panel.innerHTML =
    sec('Supply', statTiles([['Approved buildings', s.approvedBuildings], ['Approved units', s.approvedUnits], ['Total sqm', s.totalSqm], ['Total desks', s.totalDesks]])
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Listings by market</strong>' + kvTable(s.listingsByMarket, ['Market', 'Listings']) + '</div>'
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Average rent by market</strong>' + avgRentTbl + '</div>'
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Offering mix</strong>' + kvTable(s.listingsByOffering, ['Offering', 'Units']) + '</div>')
    + sec('Demand', statTiles([['Access requests by market', Object.keys(d.accessByMarket || {}).length], ['Market scans', Object.keys(d.scanByMarket || {}).length]])
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Access requests by market</strong>' + kvTable(d.accessByMarket, ['Market', 'Requests']) + '</div>'
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Market scans by market</strong>' + kvTable(d.scanByMarket, ['Market', 'Scans']) + '</div>')
    + sec('Engagement', statTiles([['Total saves', e.totalSaves]]) + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Most-saved buildings</strong>' + mostSaved + '</div>')
    + sec('Membership', statTiles([['Total companies', m.totalCompanies], ['Total users', m.totalUsers], ['Pending membership', m.pendingMembership]]) + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Active companies by tier</strong>' + kvTable(m.companiesByTier, ['Tier', 'Companies']) + '</div>')
    + sec('Requests', statTiles([['Reveal requests', Object.values((a.requests||{}).revealByBuilding||{}).reduce((x,y)=>x+y,0)], ['Site visits', Object.values((a.requests||{}).siteVisitsByMarket||{}).reduce((x,y)=>x+y,0)], ['Offers', Object.values((a.requests||{}).offersByMarket||{}).reduce((x,y)=>x+y,0)], ['Introductions', (a.requests||{}).introductions], ['Listings approved', (a.requests||{}).listingsApproved], ['Listings rejected', (a.requests||{}).listingsRejected]])
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Pending by type</strong>' + kvTable((a.requests||{}).pendingByType, ['Type', 'Pending']) + '</div>'
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Reveal requests by building</strong>' + kvTable((a.requests||{}).revealByBuilding, ['Building', 'Requests']) + '</div>'
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Site visits by market</strong>' + kvTable((a.requests||{}).siteVisitsByMarket, ['Market', 'Visits']) + '</div>'

      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Reveal grants by status</strong>' + kvTable((a.requests||{}).grantsByStatus, ['Status', 'Grants']) + '</div>')
    + sec('Data quality', statTiles([['Missing photo', q.buildingsMissingPhoto], ['Missing map', q.buildingsMissingMaps], ['Missing amenities', q.buildingsMissingAmenities], ['Missing parking', q.buildingsMissingParking], ['Units missing rent', q.unitsMissingRent], ['No units', q.buildingsNoUnits]])
      + '<div style="margin-top:14px;"><strong style="font-size:12.5px;">Construction costs last updated by market</strong>' + kvTable(a.constructionCostsByMarket, ['Market', 'Updated']) + '</div>');
}

        <div style="font-size:11px;color:var(--text-2);margin:8px 0;">${esc(m.kind || '')}${m.is_main ? ' · main' : ''}${m.approved_for_public ? ' · public' : ''}</div>
        <label style="display:flex;gap:6px;align-items:center;font-size:11.5px;margin-bottom:4px;"><input type="checkbox" ${m.approved_for_public ? 'checked' : ''} onchange="setMedia('${esc(m.id)}','${esc(b.id)}','approved_for_public',this.checked)">Public-safe</label>
        <label style="display:flex;gap:6px;align-items:center;font-size:11.5px;"><input type="checkbox" ${m.is_main ? 'checked' : ''} onchange="setMedia('${esc(m.id)}','${esc(b.id)}','is_main',this.checked)">Main image</label>
      </div>`).join('')}</div>` : emptyBox('No uploaded media for this building.')}
    </div>
    <div class="card" style="padding:22px;">
      <div class="form-sec-title" style="margin-top:0;">Units / listings (${(j.units || []).length})</div>
      <p style="font-size:11.5px;color:var(--text-2);margin:-4px 0 10px;">Each unit is a listing shown to occupiers. Archive or hide them individually.</p>
      ${(j.units || []).length ? (j.units || []).map((u, i) => `<div style="border-top:1px solid var(--border);padding:14px 0;">
        <div class="flex-b" style="flex-wrap:wrap;gap:8px;margin-bottom:8px;">
          <div style="font-size:13px;font-weight:600;">Unit ${i + 1}${u.offering_type ? ' · ' + esc(u.offering_type) : ''} <span class="badge ${u.status === 'approved' ? 'badge-available' : 'badge-gated'}" style="font-size:9px;">${esc(u.status || '—')}</span></div>
          <div style="font-size:11px;color:var(--text-2);">Added by ${esc(u.uploaderName || u.uploaderEmail || 'URBN')}</div>
        </div>
        <div class="fgs">${fieldInput('Floor', 'uf-floor-' + u.id, u.unit_floor)}${fieldInput('Size (sqm)', 'uf-size-' + u.id, u.size_sqm, 'number')}</div>
        <div class="fgs">${fieldInput('Asking rent', 'uf-rent-' + u.id, u.asking_rent, 'number')}${fieldInput('Service charge', 'uf-svc-' + u.id, u.service_charge, 'number')}</div>
        <div class="fgs">${fieldInput('Allocated parking spaces', 'uf-pk-' + u.id, u.allocated_parking_spaces, 'number')}${fieldInput('Unit parking price', 'uf-pkp-' + u.id, u.unit_parking_price, 'number')}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" onclick="saveUnit('${esc(u.id)}',this)">Save unit</button>
          ${u.status === 'approved' ? `<button class="btn btn-ghost btn-sm" onclick="setUnitStatus('${esc(u.id)}','${esc(b.id)}','draft',this)">Hide</button>` : `<button class="btn btn-ghost btn-sm" onclick="setUnitStatus('${esc(u.id)}','${esc(b.id)}','approved',this)">Publish</button>`}
          ${u.status === 'archived' ? `<button class="btn btn-ghost btn-sm" onclick="setUnitStatus('${esc(u.id)}','${esc(b.id)}','approved',this)">Restore</button>` : `<button class="btn btn-ghost btn-sm" onclick="setUnitStatus('${esc(u.id)}','${esc(b.id)}','archived',this)">Archive</button>`}
        </div>
      </div>`).join('') : emptyBox('No units.')}
    </div>`;
}
async function setUnitStatus(id, buildingId, status, btn) {
  const verb = status === 'archived' ? 'Archive' : status === 'draft' ? 'Hide' : 'Publish';
  if (!confirm(verb + ' this unit/listing?')) return;
  setBtnBusy(btn, true, '…');
  const j = await adminFetch('/api/admin/update-unit', 'POST', { id, fields: { status } });
  setBtnBusy(btn, false);
  if (j.ok) { showToast('Unit ' + status); openBuilding(buildingId); } else showToast('Failed: ' + (j.error || 'error'), 'error');
}
function gv(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function numOr(v) { return v === '' ? null : Number(v); }
function arrOr(v) { const a = String(v || '').split(/[;,]/).map(x => x.trim()).filter(Boolean); return a.length ? a : null; }
async function saveBuilding(id, btn) {
  const fields = {
    name: gv('bf-name'), grade: gv('bf-grade'), market: gv('bf-market'), submarket: gv('bf-submarket'),
    address: gv('bf-address'), google_maps_url: gv('bf-maps'), year_built: numOr(gv('bf-year')), floors: numOr(gv('bf-floors')),
    building_height_m: numOr(gv('bf-height')), total_gla_sqm: numOr(gv('bf-gla')), typical_floorplate_sqm: numOr(gv('bf-plate')),
    certifications: arrOr(gv('bf-certs')), amenities: arrOr(gv('bf-amenities')),
    parking_spaces_available: numOr(gv('bf-pk-spaces')), parking_arrangement: gv('bf-pk-arrangement') || null,
    parking_included_in_rent: gv('bf-pk-included') || null, parking_price_per_spot_month: numOr(gv('bf-pk-price')),
    visitor_parking_hourly_rate: numOr(gv('bf-pk-visitor')), parking_monthly_membership_price: numOr(gv('bf-pk-mprice')),
    parking_notes: gv('bf-pk-notes') || null,
  };
  setBtnBusy(btn, true, 'Saving…');
  const j = await adminFetch('/api/admin/update-building', 'POST', { id, fields });
  setBtnBusy(btn, false);
  showToast(j.ok ? 'Building saved' : 'Failed: ' + (j.error || 'error'), j.ok ? 'success' : 'error');
}
async function saveUnit(id, btn) {
  const fields = { unit_floor: gv('uf-floor-' + id), size_sqm: numOr(gv('uf-size-' + id)), asking_rent: numOr(gv('uf-rent-' + id)), service_charge: numOr(gv('uf-svc-' + id)), allocated_parking_spaces: numOr(gv('uf-pk-' + id)), unit_parking_price: numOr(gv('uf-pkp-' + id)) };
  setBtnBusy(btn, true, 'Saving…');
  const j = await adminFetch('/api/admin/update-unit', 'POST', { id, fields });
  setBtnBusy(btn, false);
  showToast(j.ok ? 'Unit saved' : 'Failed: ' + (j.error || 'error'), j.ok ? 'success' : 'error');
}
async function setBuildingStatus(id, status, btn) {
  if (!confirm('Set building status to "' + status + '"?')) return;
  setBtnBusy(btn, true, '…');
  const j = await adminFetch('/api/admin/unpublish-building', 'POST', { buildingId: id, status });
  setBtnBusy(btn, false);
  if (j.ok) { showToast('Status updated'); openBuilding(id); } else showToast('Failed', 'error');
}
async function setMedia(mediaId, buildingId, flag, value) {
  const body = { mediaId, buildingId }; body[flag] = value;
  const j = await adminFetch('/api/admin/set-media-flags', 'POST', body);
  showToast(j.ok ? 'Media updated' : 'Failed', j.ok ? 'success' : 'error');
}

// ── Construction costs (CAPEX inputs) ────────────────────────────────────────
async function loadCapex() {
  const panel = document.getElementById('panel-capex');
  panel.innerHTML = loadingBox();
  const j = await adminFetch('/api/admin/construction-costs', 'GET');
  if (!j.ok) { panel.innerHTML = errBox(j); return; }
  const marketOpts = (typeof URBN_DATA !== 'undefined' ? URBN_DATA.markets : []).map(m => `<option value="${m.id}">${esc(m.name)}</option>`).join('');
  const f = (label, id, ph) => `<div class="fg"><label class="fl">${esc(label)}</label><input type="number" class="fi" id="${id}" placeholder="${ph || ''}"></div>`;
  const rows = (j.costs || []);
  panel.innerHTML = `
    <div class="card" style="padding:22px;margin-bottom:18px;">
      <div class="form-sec-title" style="margin-top:0;">Add / update market construction costs</div>
      <div class="fgs">
        <div class="fg"><label class="fl">Market</label><select class="fi fi-sel" id="cx-market"><option value="">Select...</option>${marketOpts}</select></div>
        <div class="fg"><label class="fl">Currency</label><input type="text" class="fi" id="cx-currency" placeholder="e.g. EGP"></div>
      </div>
      <div class="fgs"><div class="fg"><label class="fl">Effective date</label><input type="date" class="fi" id="cx-date"></div><div class="fg"></div></div>
      <div class="fgs">${f('Shell &amp; core → CAT A / sqm', 'cx-shell')}${f('CAT A → CAT B / sqm', 'cx-cata')}</div>
      <div class="fgs">${f('Fit-out basic / sqm', 'cx-fb')}${f('Fit-out standard / sqm', 'cx-fs')}</div>
      <div class="fgs">${f('Fit-out premium / sqm', 'cx-fp')}${f('Furniture / workstation', 'cx-furn')}</div>
      <div class="fgs">${f('IT/AV / workstation', 'cx-itav')}${f('Professional fees %', 'cx-fees')}</div>
      <div class="fgs">${f('Contingency %', 'cx-cont')}${f('Reinstatement / sqm', 'cx-reins')}</div>
      <div class="fgs">${f('Moving cost allowance', 'cx-move')}<div class="fg"><label class="fl">Notes</label><input type="text" class="fi" id="cx-notes"></div></div>
      <button class="btn btn-navy btn-sm" onclick="saveCapex(this)">Save costs</button>
    </div>
    <div class="form-sec-title">History (latest per market shown first)</div>
    ${rows.length ? `<div class="card" style="padding:0;overflow:auto;"><table class="data-table"><thead><tr><th>Market</th><th>Cur</th><th>Effective</th><th>Std fit-out/sqm</th><th>Furn/ws</th><th>Fees%</th><th>Updated</th></tr></thead><tbody>${rows.map(c => `<tr><td>${esc(c.market)}</td><td>${esc(c.currency)}</td><td>${esc(c.effective_date || '—')}</td><td>${c.fitout_standard_per_sqm ?? '—'}</td><td>${c.furniture_per_workstation ?? '—'}</td><td>${c.professional_fees_pct ?? '—'}</td><td>${fmtDate(c.updated_at)}</td></tr>`).join('')}</tbody></table></div>` : emptyBox('No construction costs entered yet.')}`;
}
async function saveCapex(btn) {
  const body = {
    market: gv('cx-market'), currency: gv('cx-currency'), effective_date: gv('cx-date') || null,
    shell_core_to_cat_a_per_sqm: gv('cx-shell'), cat_a_to_cat_b_per_sqm: gv('cx-cata'),
    fitout_basic_per_sqm: gv('cx-fb'), fitout_standard_per_sqm: gv('cx-fs'), fitout_premium_per_sqm: gv('cx-fp'),
    furniture_per_workstation: gv('cx-furn'), it_av_per_workstation: gv('cx-itav'),
    professional_fees_pct: gv('cx-fees'), contingency_pct: gv('cx-cont'), reinstatement_per_sqm: gv('cx-reins'),
    moving_cost_allowance: gv('cx-move'), notes: gv('cx-notes'),
  };
  if (!body.market || !body.currency) { showToast('Market and currency are required', 'error'); return; }
  setBtnBusy(btn, true, 'Saving…');
  const j = await adminFetch('/api/admin/save-construction-costs', 'POST', body);
  setBtnBusy(btn, false);
  if (j.ok) { showToast('Construction costs saved'); loadCapex(); } else showToast('Failed: ' + (j.error || 'error'), 'error');
}
</script>
</body>
