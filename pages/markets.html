<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markets — URBN</title>
  <meta name="description" content="The 16 office markets URBN covers across Africa & MENA — verified building counts, indicative average rents and a route into pre-filtered search for each city."/>
  <link rel="canonical" href="https://urbnoffices.com/markets"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="URBN"/>
  <meta property="og:title" content="Markets — URBN"/>
  <meta property="og:description" content="16 office markets across Africa & MENA — verified building counts and indicative average rents."/>
  <meta property="og:url" content="https://urbnoffices.com/markets"/>
  <meta property="og:image" content="https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1200&q=85"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Markets — URBN"/>
  <meta name="twitter:description" content="16 office markets across Africa & MENA — verified building counts and indicative average rents."/>
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1200&q=85"/>
  <link rel="stylesheet" href="../css/urbn.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<!-- Full-bleed markets hero band -->
<div style="height:clamp(200px,28vw,320px);background:linear-gradient(180deg,rgba(20,32,55,.30),rgba(20,32,55,.06) 42%,rgba(20,32,55,.06) 70%,rgba(20,32,55,.32)),url('/assets/img/markets-hero.jpg') center 44%/cover no-repeat;" role="img" aria-label="Modern office skylines across Africa and MENA at golden hour"></div>
<div class="pt-nav" style="padding:44px 0 80px;">
  <div class="w">
    <div class="mb48">
      <span class="overline label-navy" data-i18n="mkt.overline">Coverage</span>
      <h1 style="font-size:44px;" data-i18n="footer.markets">Markets</h1>
      <p style="font-size:15px;color:var(--text-2);margin-top:14px;max-width:520px;line-height:1.8;" data-i18n="mkt.intro">URBN covers 16 office markets across Africa &amp; MENA. Each is verified directly at source. Choose a market to browse its inventory, or request a managed Market Scan.</p>
    </div>
    <div class="g4c" id="markets-grid"></div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="../data/data.js"></script>
<script src="/js/i18n.js"></script><script src="/js/i18n-pages.js"></script><script src="../js/urbn.js"></script>
<script src="../js/listings.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  injectNav('../');
  injectFooter('../');
  await URBN_LISTINGS.load();
  try { await URBNAuth.init(); } catch (e) {}
  const signedIn = !!(typeof URBNAuth !== 'undefined' && URBNAuth.user);
  const mg = document.getElementById('markets-grid');
  // i18n helpers (i18n.js/i18n-pages.js load before this script). Region/country
  // translate via dictionary maps; city names stay proper nouns.
  const T = (k, f) => { const v = (window.URBN_I18N && URBN_I18N.t) ? URBN_I18N.t(k) : null; return v != null ? v : f; };
  const tRegion = r => T('region.' + r, r);
  const tCountry = c => T('country.' + c, c);
  const comingSoon = T('home.comingSoon', 'Coming soon');

  // Logged-out: teaser only — market names + coverage, no supply counts or rent
  // bands. (Protected building/unit data is already gated server-side in /api/listings.)
  if (!signedIn) {
    mg.innerHTML = URBN_DATA.markets.map(m => `<div class="city-card">
      <div class="city-card-region">${tRegion(m.region)}</div>
      <div class="city-card-name">${m.name}, ${tCountry(m.country)}</div>
      <div class="city-card-divider"></div>
      <div style="font-size:12px;color:var(--text-2);line-height:1.6;">${T('mkt.teaserMember', 'Verified supply, building counts and indicative rent bands are available to members.')}</div>
    </div>`).join('');
    const cta = document.createElement('div');
    cta.setAttribute('style', 'grid-column:1/-1;margin-top:8px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r);padding:24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;');
    cta.innerHTML = `<div><div style="font-family:var(--fd);font-size:20px;margin-bottom:4px;">${T('mkt.teaserTitle', 'See verified market detail')}</div><p style="font-size:13px;color:var(--text-2);max-width:520px;">${T('mkt.teaserBody', 'Sign in to view supply counts and indicative rent bands, or request a managed Market Scan for live pricing.')}</p></div><div style="display:flex;gap:10px;flex-wrap:wrap;"><a href="/sign-up" class="btn btn-navy">${T('home.createAccount', 'Create account')}</a><a href="/market-scan" class="btn btn-outline">${T('home.ctaScan', 'Request Market Scan')}</a></div>`;
    mg.appendChild(cta);
    return;
  }

  URBN_DATA.markets.forEach(m => {
    const s = URBN_DATA.marketStats[m.id];
    const bc = URBN_LISTINGS.count(m.id);
    const live = bc > 0;
    const subs = m.submarkets.slice(0, 2).join(', ');
    const href = live ? `/offices?m=${m.id}` : '/market-scan';
    mg.innerHTML += `<a href="${href}" class="city-card"${live ? '' : ' style="opacity:.85;"'}>
      <div class="city-card-region">${tRegion(m.region)}</div>
      <div class="city-card-name">${m.name}, ${tCountry(m.country)} ${live ? '' : `<span class="badge badge-gated" style="font-size:9px;vertical-align:middle;">${comingSoon}</span>`}</div>
      <div class="city-card-divider"></div>
      <div class="city-card-data">
        <div class="city-card-row"><span class="city-card-label">${T('footer.buildings', 'Buildings')}</span><span class="city-card-value">${live ? bc + ' ' + T('home.listed', 'listed') : comingSoon}</span></div>
        <div class="city-card-row"><span class="city-card-label">${T('footer.districts', 'Districts')}</span><span class="city-card-value" style="font-size:11px;text-align:right;max-width:120px;">${subs}</span></div>
        ${s ? `<div class="city-card-row"><span class="city-card-label">${T('home.avgRent', 'Avg Rent')}</span><span class="city-card-value">${s.avgRent.toLocaleString()} ${m.currency}</span></div>` : ''}
      </div>
      <div class="city-card-footer">${live ? T('cta.browseOffices', 'Browse offices') + ' &rarr;' : T('home.ctaScan', 'Request a Market Scan') + ' &rarr;'}</div>
    </a>`;
  });
});
</script>
</body>
</html>
