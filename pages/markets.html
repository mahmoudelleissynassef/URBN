<body>
<div id="nav-placeholder"></div>
<div class="pt-nav" style="padding:60px 0 80px;">
  <div class="w">
    <div class="mb48">
      <span class="overline label-navy">Coverage</span>
      <h1 style="font-size:44px;">Markets</h1>
      <p style="font-size:15px;color:var(--text-2);margin-top:14px;max-width:520px;line-height:1.8;">URBN covers 16 office markets across Africa &amp; MENA. Each is verified directly at source. Choose a market to browse its inventory, or request a managed Market Scan.</p>
    </div>
    <div class="g4c" id="markets-grid"></div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="../data/data.js"></script>
<script src="../js/urbn.js"></script>
<script src="../js/listings.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  injectNav('../');
  injectFooter('../');
  await URBN_LISTINGS.load();
  const mg = document.getElementById('markets-grid');
  URBN_DATA.markets.forEach(m => {
    const s = URBN_DATA.marketStats[m.id];
    const bc = URBN_LISTINGS.count(m.id);
    const live = bc > 0;
    const subs = m.submarkets.slice(0, 2).join(', ');
    const href = live ? `/offices?m=${m.id}` : '/market-scan';
    mg.innerHTML += `<a href="${href}" class="city-card"${live ? '' : ' style="opacity:.85;"'}>
      <div class="city-card-region">${m.region}</div>
      <div class="city-card-name">${m.name}, ${m.country} ${live ? '' : '<span class="badge badge-gated" style="font-size:9px;vertical-align:middle;">Coming soon</span>'}</div>
      <div class="city-card-divider"></div>
      <div class="city-card-data">
        <div class="city-card-row"><span class="city-card-label">Buildings</span><span class="city-card-value">${live ? bc + ' listed' : 'Coming soon'}</span></div>
        <div class="city-card-row"><span class="city-card-label">Districts</span><span class="city-card-value" style="font-size:11px;text-align:right;max-width:120px;">${subs}</span></div>
        ${s ? `<div class="city-card-row"><span class="city-card-label">Avg Rent</span><span class="city-card-value">${s.avgRent.toLocaleString()} ${m.currency}</span></div>` : ''}
      </div>
      <div class="city-card-footer">${live ? 'Browse offices &rarr;' : 'Request a Market Scan &rarr;'}</div>
    </a>`;
  });
});
</script>
</body>
</html>
