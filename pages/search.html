<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Offices — URBN</title>
  <link rel="stylesheet" href="../css/urbn.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="pt-nav" style="display:flex;min-height:calc(100vh - var(--nav-h));">

  <!-- Filter Panel -->
  <div class="fp">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <span style="font-family:var(--fm);font-size:10px;letter-spacing:.14em;color:var(--text-2);text-transform:uppercase;">Filters</span>
      <button onclick="resetFilters()" class="btn btn-ghost btn-sm" style="padding:4px 10px;font-size:10px;">Reset</button>
    </div>

    <div class="fg-section">
      <div class="fg-title">View</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        <button class="btn btn-dark btn-sm" id="vb" onclick="setView('buildings',this)">Buildings</button>
        <button class="btn btn-ghost btn-sm" id="vu" onclick="setView('units',this)">Units</button>
      </div>
    </div>

    <div class="fg-section">
      <div class="fg-title">Market</div>
      <div class="chips" id="market-chips"></div>
    </div>

    <div class="fg-section">
      <div class="fg-title">District</div>
      <div class="chips" id="district-chips"><span style="font-size:11px;color:var(--text-2);">Select market first</span></div>
    </div>

    <div class="fg-section">
      <div class="fg-title">Grade</div>
      <div class="chips">
        <button class="chip" data-f="grade" data-v="A+">Grade A+</button>
        <button class="chip" data-f="grade" data-v="A">Grade A</button>
      </div>
    </div>

    <div class="fg-section">
      <div class="fg-title">Available Area (sqm)</div>
      <div class="rr">
        <input type="number" class="fi" id="minArea" placeholder="Min" style="font-size:12px;">
        <input type="number" class="fi" id="maxArea" placeholder="Max" style="font-size:12px;">
      </div>
    </div>

    <div class="fg-section">
      <div class="fg-title">Desk Capacity</div>
      <div class="rr">
        <input type="number" class="fi" id="minDesks" placeholder="Min" style="font-size:12px;">
        <input type="number" class="fi" id="maxDesks" placeholder="Max" style="font-size:12px;">
      </div>
    </div>

    <div class="fg-section">
      <div class="fg-title">Min Meeting Rooms</div>
      <input type="number" class="fi" id="minMR" placeholder="e.g. 3" style="font-size:12px;">
    </div>

    <div class="fg-section">
      <div class="fg-title">Certification</div>
      <div class="chips">
        <button class="chip" data-f="cert" data-v="LEED">LEED</button>
        <button class="chip" data-f="cert" data-v="BREEAM">BREEAM</button>
        <button class="chip" data-f="cert" data-v="WELL">WELL</button>
        <button class="chip" data-f="cert" data-v="Green Star">Green Star</button>
      </div>
    </div>

    <div class="fg-section">
      <div class="fg-title">Condition</div>
      <div class="chips">
        <button class="chip" data-f="cond" data-v="fitted">Fitted</button>
        <button class="chip" data-f="cond" data-v="shell">Shell & Core</button>
        <button class="chip" data-f="cond" data-v="furnished">Furnished</button>
      </div>
    </div>

    <button onclick="applyFilters()" class="btn btn-primary w-full" style="margin-top:8px;">Apply Filters</button>
  </div>

  <!-- Main -->
  <div style="flex:1;padding:32px 36px;overflow-y:auto;">
    <div class="flex-b mb32">
      <div>
        <h2 style="font-size:28px;" id="search-title">All Markets</h2>
        <p style="font-size:12px;color:var(--text-2);margin-top:4px;" id="search-count">Loading...</p>
      </div>
      <select class="fi fi-sel" id="sort-sel" onchange="applyFilters()" style="width:170px;font-size:12px;">
        <option value="">Sort: Default</option>
        <option value="rent-asc">Rent: Low to High</option>
        <option value="rent-desc">Rent: High to Low</option>
        <option value="size-desc">Size: Largest First</option>
        <option value="grade">Grade A+ First</option>
      </select>
    </div>
    <div id="results" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;"></div>
    <div id="no-results" class="hidden" style="text-align:center;padding:80px 0;color:var(--text-2);">
      <div style="font-family:var(--fd);font-size:28px;margin-bottom:8px;">No Offices Found</div>
      <p>Try adjusting your filters.</p>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="../data/data.js"></script>
<script src="../js/urbn.js"></script>
<script>
let F = { market: [], grade: [], cert: [], cond: [] };
let view = 'buildings';

document.addEventListener('DOMContentLoaded', () => {
  injectNav('../');
  injectFooter('../');

  // Market chips
  const mc = document.getElementById('market-chips');
  URBN_DATA.markets.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'chip'; btn.textContent = m.name;
    btn.onclick = () => toggleMarket(m.id, btn);
    mc.appendChild(btn);
  });

  // Generic chip toggles
  document.querySelectorAll('.chip[data-f]').forEach(c => {
    c.addEventListener('click', () => {
      c.classList.toggle('on');
      const arr = F[c.dataset.f] || (F[c.dataset.f] = []);
      const i = arr.indexOf(c.dataset.v);
      i > -1 ? arr.splice(i,1) : arr.push(c.dataset.v);
      applyFilters();
    });
  });

  // URL param
  const mp = p('m');
  if (mp) {
    const btn = mc.querySelector('button:nth-child(' + (URBN_DATA.markets.findIndex(x=>x.id===mp)+1) + ')');
    if (btn) { btn.classList.add('on'); toggleMarket(mp, btn); }
  }

  applyFilters();
});

function toggleMarket(id, btn) {
  btn.classList.toggle('on');
  const i = F.market.indexOf(id);
  i > -1 ? F.market.splice(i,1) : F.market.push(id);

  const dc = document.getElementById('district-chips');
  if (F.market.length === 0) { dc.innerHTML = '<span style="font-size:11px;color:var(--text-2);">Select market first</span>'; }
  else {
    dc.innerHTML = '';
    F.market.forEach(mid => {
      const m = URBN_DATA.markets.find(x=>x.id===mid);
      m?.submarkets.forEach(sm => {
        const b = document.createElement('button');
        b.className = 'chip'; b.textContent = sm;
        b.onclick = () => b.classList.toggle('on');
        dc.appendChild(b);
      });
    });
  }
  applyFilters();
}

function setView(v, btn) {
  view = v;
  document.getElementById('vb').className = v==='buildings' ? 'btn btn-dark btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('vu').className = v==='units' ? 'btn btn-dark btn-sm' : 'btn btn-ghost btn-sm';
  applyFilters();
}

function resetFilters() {
  F = { market:[], grade:[], cert:[], cond:[] };
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  ['minArea','maxArea','minDesks','maxDesks','minMR'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  document.getElementById('sort-sel').value = '';
  document.getElementById('district-chips').innerHTML = '<span style="font-size:11px;color:var(--text-2);">Select market first</span>';
  applyFilters();
}

function applyFilters() {
  let res = [...URBN_DATA.buildings];
  if (F.market.length) res = res.filter(b => F.market.includes(b.market));
  if (F.grade.length) res = res.filter(b => F.grade.includes(b.grade));
  if (F.cert.length) res = res.filter(b => F.cert.some(c => b.sustainability.some(s => s.includes(c))));
  const minA = +document.getElementById('minArea')?.value;
  const maxA = +document.getElementById('maxArea')?.value;
  if (minA) res = res.filter(b => b.availMax >= minA);
  if (maxA) res = res.filter(b => b.availMin <= maxA);
  const minD = +document.getElementById('minDesks')?.value;
  if (minD) res = res.filter(b => b.units.some(u => u.desks >= minD));
  const minMR = +document.getElementById('minMR')?.value;
  if (minMR) res = res.filter(b => b.units.some(u => u.meetingRooms >= minMR));

  const sort = document.getElementById('sort-sel')?.value;
  if (sort === 'rent-asc') res.sort((a,b) => a.rentMin - b.rentMin);
  if (sort === 'rent-desc') res.sort((a,b) => b.rentMax - a.rentMax);
  if (sort === 'size-desc') res.sort((a,b) => b.gla - a.gla);
  if (sort === 'grade') res.sort((a,b) => a.grade==='A+' ? -1 : 1);

  const mnames = F.market.length ? F.market.map(id => URBN_DATA.markets.find(m=>m.id===id)?.name).join(', ') : 'All Markets';
  document.getElementById('search-title').textContent = mnames;
  document.getElementById('search-count').textContent = `${res.length} building${res.length!==1?'s':''} found`;

  const grid = document.getElementById('results');
  const noR = document.getElementById('no-results');
  if (!res.length) { grid.innerHTML = ''; noR.classList.remove('hidden'); return; }
  noR.classList.add('hidden');

  if (view === 'buildings') {
    grid.style.gridTemplateColumns = 'repeat(3,1fr)';
    grid.innerHTML = res.map(b => renderCard(b, '../')).join('');
  } else {
    grid.style.gridTemplateColumns = '1fr';
    grid.innerHTML = res.flatMap(b => b.units.map(u => {
      const mkt = URBN_DATA.markets.find(m=>m.id===b.market);
      return `<div class="card card-lift" style="padding:22px;cursor:pointer;" onclick="window.location.href='building.html?id=${b.id}'">
        <div class="flex-b mb16">
          <div>
            <div style="font-family:var(--fd);font-size:18px;color:var(--text);">${b.name}</div>
            <div style="font-family:var(--fm);font-size:9.5px;color:var(--text-2);margin-top:3px;text-transform:uppercase;">${b.submarket} · ${mkt?.country} · Floor ${u.floor}</div>
          </div>
          ${gradeB(b.grade)}
        </div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);">
          <div><div style="font-family:var(--fm);font-size:14px;color:var(--text);">${u.size} sqm</div><div style="font-size:10px;color:var(--text-2);">Area</div></div>
          <div><div style="font-family:var(--fm);font-size:14px;color:var(--text);">${u.desks}</div><div style="font-size:10px;color:var(--text-2);">Desks</div></div>
          <div><div style="font-family:var(--fm);font-size:14px;color:var(--text);">${u.meetingRooms}</div><div style="font-size:10px;color:var(--text-2);">Mtg Rooms</div></div>
          <div><div style="font-family:var(--fm);font-size:14px;color:var(--accent);">${b.rentCurrency} ${u.rent.toLocaleString()}</div><div style="font-size:10px;color:var(--text-2);">per sqm/mo</div></div>
          <div><span class="badge badge-available">Available</span></div>
        </div>
        <div class="flex-b mt16">
          <span style="font-size:12px;color:var(--text-2);">Floor ${u.floor} · ${u.type}</span>
          <span class="btn btn-dark btn-sm">View Building →</span>
        </div>
      </div>`;
    })).join('');
  }
}
</script>
</body>
</html>
