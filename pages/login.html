<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — URBN</title>
  <link rel="stylesheet" href="../css/urbn.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="pt-nav" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;">
  <div style="width:100%;max-width:400px;">
    <div class="text-center mb32">
      <div style="width:44px;height:44px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:20px;font-style:italic;color:var(--bg);margin:0 auto 18px;font-weight:500;">U</div>
      <h2 style="font-size:32px;">Welcome back</h2>
      <p style="font-size:13px;color:var(--text-2);margin-top:8px;">Sign in to your URBN account</p>
    </div>
    <div class="card" style="padding:32px;">
      <div class="fg"><label class="fl">Corporate Email</label><input type="email" class="fi" placeholder="you@company.com"></div>
      <div class="fg"><label class="fl">Password</label><input type="password" class="fi" placeholder="••••••••"></div>
      <button class="btn btn-primary w-full mt16" onclick="window.location.href='../index.html'">Sign In</button>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-2);">
        No account? <a href="#" style="color:var(--accent);">Request Access</a>
      </div>
    </div>
    <div style="text-align:center;margin-top:14px;">
      <span class="badge badge-verified" style="font-size:9px;">Demo Mode — access granted</span>
    </div>
  </div>
</div>
<script src="../data/data.js"></script>
<script src="../js/urbn.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{injectNav('../');});</script>
</body>
</html>
